task: sft_lora
output_dir: runs/sft/qwen25_3b_miniv2_sft_lora
logging_dir: runs/sft/qwen25_3b_miniv2_sft_lora/logs

seed: 42
num_train_epochs: 2
max_steps: 2000
save_steps: 250
eval_steps: 250
logging_steps: 10

per_device_train_batch_size: 1
per_device_eval_batch_size: 1
gradient_accumulation_steps: 16

learning_rate: 1.0e-4
weight_decay: 0.0
warmup_ratio: 0.03
lr_scheduler_type: cosine

max_seq_length: 2048
fp16: true
tf32: true

packing: true
train_on_prompt: false
gradient_checkpointing: true
remove_unused_columns: false
report_to:
  - tensorboard
