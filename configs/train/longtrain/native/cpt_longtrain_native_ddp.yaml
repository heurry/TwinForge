experiment_tier: longtrain
experiment_name: cpt_longtrain_native_ddp
training_backend: ddp
tokenized_dataset_path: data/tokenized/cpt/train
include_num_input_tokens_seen: all

task: continued_pretraining
output_dir: runs/cpt/longtrain/native/qwen3_1_7b/ddp_recommended
logging_dir: runs/cpt/longtrain/native/qwen3_1_7b/ddp_recommended/logs

seed: 42
num_train_epochs: 1
max_steps: 3000
save_steps: 500
eval_steps: 500
logging_steps: 10
cuda_memory_logging_steps: 10

per_device_train_batch_size: 1
per_device_eval_batch_size: 1
gradient_accumulation_steps: 4

learning_rate: 2.0e-5
weight_decay: 0.1
warmup_ratio: 0.03
lr_scheduler_type: cosine

max_seq_length: 2048
bf16: false
fp16: false
tf32: true

gradient_checkpointing: true
dataloader_num_workers: 4
remove_unused_columns: false
overwrite_output_dir: false
save_total_limit: 3
save_model_artifacts: true
ddp_find_unused_parameters: false
report_to:
  - tensorboard
