experiment_tier: resume_validation
experiment_name: cpt_resume_zero2_stage2
training_backend: deepspeed_zero2
resume_validation_group: cpt_resume_zero2
tokenized_dataset_path: data/tokenized/cpt/bench
include_num_input_tokens_seen: all

task: continued_pretraining
output_dir: runs/cpt/resume_validation/deepspeed/qwen3_1_7b/zero2_recommended
logging_dir: runs/cpt/resume_validation/deepspeed/qwen3_1_7b/zero2_recommended/logs

seed: 42
num_train_epochs: 1
max_steps: 12
save_steps: 12
eval_steps: 1000
logging_steps: 5
cuda_memory_logging_steps: 5

per_device_train_batch_size: 1
per_device_eval_batch_size: 1
gradient_accumulation_steps: 8

learning_rate: 2.0e-5
weight_decay: 0.1
warmup_ratio: 0.03
lr_scheduler_type: cosine

max_seq_length: 2048
bf16: false
fp16: true
tf32: false

gradient_checkpointing: true
dataloader_num_workers: 2
remove_unused_columns: false
overwrite_output_dir: false
save_total_limit: 2
save_model_artifacts: true
ddp_find_unused_parameters: false
report_to:
  - tensorboard
